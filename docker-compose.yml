services:
  # PostgreSQL Database
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: quantpulse-postgres
    environment:
      POSTGRES_DB: quantpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: quantpulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Single Celery Worker (simplified) - HANDLES ALL QUEUES
  celery-worker:
    build: .
    container_name: quantpulse-celery-worker
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:password@postgres:5432/quantpulse
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    working_dir: /app
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=8 --queues=default,import,data_fetch,aggregation,maintenance --without-gossip --without-mingle
    restart: unless-stopped

  # FastAPI Application
  api:
    build: .
    container_name: quantpulse-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:password@postgres:5432/quantpulse
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    working_dir: /app
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
